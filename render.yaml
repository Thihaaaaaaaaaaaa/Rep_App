# One-click-ish deploy to Render (render.com).
# Push this repo, then "New + → Blueprint" and point it here.
# Render will prompt you to fill in the secret values below.
services:
  - type: web
    name: reps
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
