<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reps · Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap');
:root{--bg:#0F1013;--surface:#17191E;--surface2:#22252B;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --text:#F1F0EC;--muted:#8B8F97;--faint:#585C64;--accent:#D6A24A;--red:#E07177;--green:#5FB87E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:28px 18px;max-width:760px;margin:0 auto}
h1,h2,.mono{font-family:'Space Grotesk',sans-serif}.mono{font-variant-numeric:tabular-nums}
h1{font-size:24px;font-weight:600;margin-bottom:4px}.sub{color:var(--muted);font-size:13px;margin-bottom:24px}
h2{font-size:15px;font-weight:600;margin:26px 0 12px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.gate{text-align:center;padding:60px 20px;color:var(--muted)}
.gate a{color:var(--accent);font-weight:600;text-decoration:none}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select,input{background:var(--surface2);border:1px solid var(--line2);color:var(--text);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13.5px}
input{flex:1;min-width:140px}
button{background:var(--text);color:#15161A;border:none;border-radius:9px;padding:10px 16px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer}
button.ghost{background:transparent;color:var(--text);border:1px solid var(--line2)}
button.danger{background:var(--red);color:#220c0c}
button.sm{padding:6px 11px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--faint);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--line);vertical-align:middle}
td.mono{font-family:'Space Grotesk';font-size:11.5px}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--surface2);color:var(--muted)}
.s2{color:#7fd49b}.s4{color:#e0a877}.s5{color:var(--red)}
.empty{color:var(--faint);font-size:13px;padding:8px}
.scroll{max-height:340px;overflow:auto}
.refresh{float:right;background:transparent;color:var(--accent);border:none;font-size:12px;font-weight:600;cursor:pointer;padding:0}
</style>
</head>
<body>
<h1>REPS Admin</h1>
<div class="sub" id="who">Checking access…</div>
<div id="panel" style="display:none">

  <h2>Ban someone <button class="refresh" id="rBans">refresh</button></h2>
  <div class="card">
    <div class="row">
      <select id="banType"><option value="user">User ID</option><option value="client">Client ID</option><option value="ip">IP address</option></select>
      <input id="banValue" placeholder="value to ban"/>
      <input id="banReason" placeholder="reason (optional)" style="flex:1.4"/>
      <button class="danger" id="btnBan">Ban</button>
    </div>
  </div>
  <div class="card"><div class="scroll"><table><thead><tr><th>Type</th><th>Value</th><th>Reason</th><th></th></tr></thead><tbody id="bansBody"><tr><td colspan="4" class="empty">Loading…</td></tr></tbody></table></div></div>

  <h2>Reports <button class="refresh" id="rReports">refresh</button></h2>
  <div class="card"><div class="scroll"><table><thead><tr><th>When</th><th>Type</th><th>Target</th><th>Reason</th><th></th></tr></thead><tbody id="reportsBody"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody></table></div></div>

  <h2>Recent requests <button class="refresh" id="rLogs">refresh</button></h2>
  <div class="card"><div class="scroll"><table><thead><tr><th>Time</th><th>Method</th><th>Path</th><th>St</th><th>User</th><th>IP</th></tr></thead><tbody id="logsBody"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody></table></div></div>

</div>
<script src="/admin.js"></script>
</body>
</html>
